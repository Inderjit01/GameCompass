<!DOCTYPE html>
<html>
<body>
    <!-- id is like a name/tag for this HTML element. React uses this name
        to find where it should place the React components -->
    <div id="root"></div>

    <!-- This script loads the React/TypeScript file. The TSX file then 
        starts React and renders the UI inside the element with id="root"
        -->
    <script type="module" src="/src/splash-screen/MainSplashScreen.tsx"></script>
</body>
</html>
